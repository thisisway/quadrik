services:
  postgres:
    image: postgres:16-alpine
    container_name: quadrik_postgres
    environment:
      POSTGRES_USER: quadrik
      POSTGRES_PASSWORD: quadrik
      POSTGRES_DB: quadrik_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quadrik -d quadrik_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quadrik_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
